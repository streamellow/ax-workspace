version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
      - ./backend/credentials.json:/app/credentials.json:ro
      - ./backend/token.json:/app/token.json
      - ./backend/calendar_token.json:/app/calendar_token.json
    restart: unless-stopped

volumes:
  data:
